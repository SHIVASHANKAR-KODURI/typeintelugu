<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telugu Writer Pro</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="editor-frame">
    <div id="toolbar-container">
        <span class="ql-formats">
            <button class="ql-bold"></button>
            <button class="ql-italic"></button>
            <button class="ql-underline"></button>
            <button class="ql-strike"></button>
        </span>
        <span class="ql-formats">
            <select class="ql-size">
                <option value="8px">8</option>
                <option value="10px">10</option>
                <option value="12px">12</option>
                <option value="14px">14</option>
                <option value="16px" selected>16</option>
                <option value="18px">18</option>
                <option value="20px">20</option>
                <option value="24px">24</option>
                <option value="28px">28</option>
                <option value="32px">32</option>
                <option value="36px">36</option>
                <option value="45px">45</option>
            </select>
        </span>
        <span class="ql-formats">
            <button class="ql-align" value=""></button>
            <button class="ql-align" value="center"></button>
            <button class="ql-align" value="right"></button>
            <button class="ql-align" value="justify"></button>
        </span>
        <span class="ql-formats">
            <button class="ql-list" value="ordered"></button>
            <button class="ql-list" value="bullet"></button>
        </span>
        <span class="ql-formats">
            <button class="ql-clean"></button>
        </span>
    </div>

    <div id="editor-container">
        <div id="editor"></div>
    </div>
</div>

<div class="input-box">
    <input
        id="tenglishInput"
        type="text"
        placeholder="Type here (e.g.'telaMgaNa' for 'తెలంగాణ')"
        autocomplete="off"
    >
    <div id="preview"></div>
</div>

<button id="keyboardBtn">⌨</button>

<div id="teluguKeyboard">
    <div id="keyboardHeader">
        Telugu Keyboard
        <span id="closeKeyboard">✕</span>
    </div>

    <div id="keyboardTabs">
        <button class="tabBtn" data-tab="vowels">అచ్చులు</button>
        <button class="tabBtn" data-tab="consonants">హల్లులు</button>
        <button class="tabBtn" data-tab="guninthalu">గుణింతాలు</button>
        <button class="tabBtn" data-tab="otthulu">ఒత్తులు</button>
        <button class="tabBtn" data-tab="numbers">౧౨౩</button>
        <button class="tabBtn" data-tab="symbols">#?+</button>
    </div>

    <div id="keyboardKeys"></div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@sanskrit-coders/sanscript@1.2.8/sanscript.min.js"></script>
<script src="script.js"></script>
</body>
</html>
